<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HeyJobs Header</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; }

    .scene {
      position: relative;
      display: inline-block;
      width: 920px;
      height: 1000px;
      isolation: isolate;
    }

    .phone-wrap {
      position: absolute;
      top: 80px; left: 240px;
      width: 420px;
      z-index: 2;
    }
    .phone-frame { position: relative; width: 420px; }

    .screen-clip {
      position: absolute;
      top: 6%; left: 5%;
      width: 90%; height: 85%;
      overflow: hidden;
      border-radius: 10px;
      z-index: 1;
      background: #fff;
    }

    .screen-slide {
      position: absolute; inset: 0;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    .screen-slide.active { opacity: 1; }

    .screen-slide iframe {
      border: none;
      width: 393px; height: 852px;
      transform-origin: 0 0;
      transform: scale(0.961);
      display: block;
      pointer-events: none;
    }

    .dots {
      position: absolute;
      bottom: 1.8%; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 6px; z-index: 4;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(80,80,80,0.3);
      transition: background 0.3s, transform 0.3s;
      cursor: pointer;
    }
    .dot.active { background: #D02879; transform: scale(1.3); }

    .phone-png {
      position: absolute; inset: 0;
      width: 100%; display: block;
      z-index: 3; pointer-events: none;
    }

    .flyout { position: absolute; z-index: 10; }
    .flyout img { display: block; }

    .flyout-right {
      left: 482px; top: 80px; width: 424px;
      animation: fl2 5.8s ease-in-out infinite;
    }
    .flyout-right img { width: 100%; }

    .flyout-left {
      left: 80px; top: 315px; width: 343px;
      animation: fl1 5.2s ease-in-out infinite;
    }
    .flyout-left img { width: 100%; }

    @keyframes fl1 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    @keyframes fl2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
  </style>
</head>
<body>
<div class="scene">

  <div class="phone-wrap" id="phoneWrap">
    <div class="phone-frame">
      <div class="screen-clip">

        <div class="screen-slide active" id="s0">
          <iframe src="screen_1.html" scrolling="no"></iframe>
        </div>
        <div class="screen-slide" id="s1">
          <iframe src="screen_2.html" scrolling="no"></iframe>
        </div>
        <div class="screen-slide" id="s2">
          <iframe src="screen_3.html" scrolling="no"></iframe>
        </div>

        <div class="dots">
          <div class="dot active" id="d0"></div>
          <div class="dot" id="d1"></div>
          <div class="dot" id="d2"></div>
        </div>
      </div>

      <img class="phone-png"
        src="https://res.cloudinary.com/heyjobs/image/upload/v1780564047/marketing/iPhone_website_Header.png"
        alt="">
    </div>
  </div>

  <div class="flyout flyout-left" id="f1">
    <img src="flyout_left.svg" alt="">
  </div>
  <div class="flyout flyout-right" id="f2">
    <img src="flyout_right.svg" alt="">
  </div>

</div>
<script>
const slides = ['s0','s1','s2'].map(id => document.getElementById(id));
const dots   = ['d0','d1','d2'].map(id => document.getElementById(id));
const phoneWrap = document.getElementById('phoneWrap');
const f1 = document.getElementById('f1');
const f2 = document.getElementById('f2');
let cur = 0;

function goTo(idx) {
  slides[cur].classList.remove('active');
  dots[cur].classList.remove('active');
  cur = idx;
  slides[cur].classList.add('active');
  dots[cur].classList.add('active');
}

dots.forEach((d,i) => d.addEventListener('click', () => goTo(i)));
setInterval(() => goTo((cur+1)%3), 4000);

let mx=0,my=0,lx=0,ly=0;
document.addEventListener('mousemove', e => {
  mx = (e.clientX/innerWidth -0.5)*2;
  my = (e.clientY/innerHeight-0.5)*2;
});
(function loop(){
  requestAnimationFrame(loop);
  lx+=(mx-lx)*0.06; ly+=(my-ly)*0.06;
  phoneWrap.style.transform=`translate(${lx*8}px,${ly*5}px)`;
  f1.style.transform=`translateY(0) translate(${lx*22}px,${ly*14}px)`;
  f2.style.transform=`translateY(0) translate(${lx*30}px,${ly*18}px)`;
})();
</script>
</body>
</html>
