<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button mit 3D Roll-Animation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            font-weight: 500;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #fff;
        }

        .button-wrapper {
            position: relative;
            display: flex;
            gap: 30px;
            cursor: pointer;
            align-items: center;
        }

        .button-left-container,
        .button-right-container {
            perspective: 1000px;
            flex-shrink: 0;
        }

        .button-left-3d,
        .button-right-3d {
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .button-left-3d {
            width: 560px;
            height: 120px;
        }

        .button-right-3d {
            width: 120px;
            height: 120px;
        }

        .button-face {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        /* Button Links - Front (Schwarz) */
        .button-left-3d .button-face-front {
            background: #181A22;
            border-radius: 100px;
            transform: rotateX(0deg) translateZ(60px);
        }

        /* Button Links - Back (Gradient - linker Teil) */
        .button-left-3d .button-face-back {
            background: linear-gradient(135deg, #D02879 0%, #F6694E 50%, #F5B100 100%);
            background-size: 710px 120px;
            background-position: 0 0;
            border-radius: 100px;
            transform: rotateX(-180deg) translateZ(60px);
        }

        /* Button Rechts - Front (Schwarz) */
        .button-right-3d .button-face-front {
            background: #181A22;
            border-radius: 20px;
            transform: rotateX(0deg) translateZ(60px);
        }

        /* Button Rechts - Back (Gradient - rechter Teil) */
        .button-right-3d .button-face-back {
            background: linear-gradient(135deg, #D02879 0%, #F6694E 50%, #F5B100 100%);
            background-size: 710px 120px;
            background-position: -590px 0;
            border-radius: 20px;
            transform: rotateX(180deg) translateZ(60px);
        }

        .arrow-icon {
            width: 40px;
            height: 40px;
            stroke: white;
            stroke-width: 2;
            fill: none;
        }

        /* Hover Effekt */
        .button-wrapper:hover .button-left-3d {
            transform: rotateX(180deg);
        }

        .button-wrapper:hover .button-right-3d {
            transform: rotateX(-180deg);
        }

        /* Active Effekt */
        .button-wrapper:active .button-left-container,
        .button-wrapper:active .button-right-container {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="button-wrapper">
        <div class="button-left-container">
            <div class="button-left-3d">
                <div class="button-face button-face-front">Jetzt beraten lassen</div>
                <div class="button-face button-face-back">Jetzt beraten lassen</div>
            </div>
        </div>
        <div class="button-right-container">
            <div class="button-right-3d">
                <div class="button-face button-face-front">
                    <svg class="arrow-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 12h14M12 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="button-face button-face-back">
                    <svg class="arrow-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 12h14M12 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
