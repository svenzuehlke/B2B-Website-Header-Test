<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'ES Rebond Grotesque';
  src: url('https://raw.githubusercontent.com/svenzuehlke/B2B-Website-Header-Test/7cd5ce5bbd4f45a8e296631cdceaf7cbab2bc903/ES-Rebond-Grotesque_Essential/ESRebondGrotesque-Bold.woff2') format('woff2'),
       url('https://raw.githubusercontent.com/svenzuehlke/B2B-Website-Header-Test/7cd5ce5bbd4f45a8e296631cdceaf7cbab2bc903/ES-Rebond-Grotesque_Essential/ESRebondGrotesque-Bold.woff') format('woff');
  font-weight: 700; font-style: normal;
}
@font-face {
  font-family: 'ES Rebond Grotesque';
  src: url('https://raw.githubusercontent.com/svenzuehlke/B2B-Website-Header-Test/7cd5ce5bbd4f45a8e296631cdceaf7cbab2bc903/ES-Rebond-Grotesque_Essential/ESRebondGrotesque-Regular.woff2') format('woff2'),
       url('https://raw.githubusercontent.com/svenzuehlke/B2B-Website-Header-Test/7cd5ce5bbd4f45a8e296631cdceaf7cbab2bc903/ES-Rebond-Grotesque_Essential/ESRebondGrotesque-Regular.woff') format('woff');
  font-weight: 400; font-style: normal;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 393px; height: 852px; overflow: hidden; background: #fff; font-family: 'IBM Plex Sans', sans-serif; }
.screen { position: relative; width: 393px; height: 852px; overflow: hidden; background: #fff; }

/* Nav */
.nav {
  display: flex; flex-direction: row; justify-content: space-between; align-items: center;
  padding: 16px 24px 12px;
  position: absolute; width: 393px; height: 72px; left: 0; top: 0;
  background: #fff; z-index: 10;
  box-shadow: 0px 2px 4px rgba(76,82,107,0.06), 0px 2px 4px rgba(24,26,34,0.04), 0px -2px 4px rgba(76,82,107,0.04);
}
.nav-logo { width: 116px; height: 36px; }
.nav-icons { display: flex; align-items: center; gap: 16px; }
.nav-icon-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
.nav-icon-btn svg { width: 24px; height: 24px; }

/* Content */
.content {
  position: absolute; left: 0; top: 72px;
  width: 393px; height: 601px;
  overflow: hidden;
  display: flex; flex-direction: column;
}

.job-title-section {
  display: flex; align-items: center;
  padding: 32px 24px 0px;
  width: 393px; height: 110px; flex-shrink: 0;
}
.job-title {
  font-family: 'ES Rebond Grotesque', sans-serif;
  font-weight: 700; font-size: 32px; line-height: 122%;
  color: #181A22; width: 244px;
}

.company-section {
  display: flex; flex-direction: column; align-items: flex-start;
  padding: 0px 24px; gap: 16px;
  margin-top: 16px; flex-shrink: 0;
}
.company-row { display: flex; flex-direction: row; align-items: flex-start; gap: 16px; }
.company-logo {
  width: 80px; height: 80px;
  border: 2px solid #9397A9; border-radius: 8px;
  background: #fff; overflow: hidden; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.company-logo img { width: 53.71px; height: 54.1px; object-fit: contain; }
.company-info { display: flex; flex-direction: column; gap: 8px; width: 231px; padding-top: 2px; }
.company-name {
  font-family: 'IBM Plex Sans', sans-serif;
  font-weight: 500; font-size: 22px; line-height: 30px;
  letter-spacing: 0.2px; text-decoration: underline; color: #181A22;
}
.verified-badge { display: flex; align-items: center; gap: 8px; height: 24px; }
.verified-badge svg { width: 24px; height: 24px; flex-shrink: 0; }
.verified-text { font-family: 'IBM Plex Sans', sans-serif; font-weight: 500; font-size: 16px; line-height: 24px; letter-spacing: 0.1px; color: #0A7749; }

.location-row { display: flex; flex-direction: row; align-items: center; gap: 8px; flex-wrap: wrap; }
.location-item { display: flex; align-items: center; padding: 4px 0; gap: 8px; }
.location-item svg { width: 24px; height: 24px; flex-shrink: 0; }
.location-text { font-family: 'IBM Plex Sans', sans-serif; font-weight: 400; font-size: 16px; line-height: 24px; letter-spacing: 0.1px; color: #313545; }
.badge-green { display: flex; align-items: center; padding: 4px 8px; background: #40B584; border-radius: 8px; font-family: 'IBM Plex Sans', sans-serif; font-weight: 500; font-size: 14px; line-height: 22px; color: #fff; white-space: nowrap; }

.details-section { display: flex; flex-direction: column; align-items: flex-start; padding: 0px 24px; gap: 16px; width: 393px; margin-top: 16px; flex-shrink: 0; }
.detail-row { display: flex; align-items: center; gap: 8px; height: 24px; }
.detail-row svg { width: 24px; height: 24px; flex-shrink: 0; }
.detail-text { font-family: 'IBM Plex Sans', sans-serif; font-weight: 400; font-size: 16px; line-height: 24px; letter-spacing: 0.1px; color: #313545; }

/* Bottom */
.bottom-area { position: absolute; left: 0; bottom: 0; width: 394px; display: flex; flex-direction: column; }
.bottom-nav {
  display: flex; flex-direction: row; justify-content: space-between; align-items: center;
  padding: 23px 25.19px; width: 394px; height: 96.38px;
  background: #fff;
  box-shadow: 0px 4.2px 6.3px rgba(76,82,107,0.08), 0px 2.1px 2.1px rgba(24,26,34,0.06), 0px -2.1px 4.2px rgba(76,82,107,0.04);
}
.btn-save { display: flex; align-items: center; justify-content: center; padding: 12.6px 0; width: 73.47px; height: 50.38px; border-radius: 8.4px; background: transparent; border: none; cursor: pointer; }
.btn-save-label { font-family: 'IBM Plex Sans', sans-serif; font-weight: 600; font-size: 16.79px; line-height: 25px; letter-spacing: 0.022em; text-decoration: underline; color: #181A22; white-space: nowrap; }
.btn-apply { display: flex; justify-content: center; align-items: center; padding: 12.6px 0; width: 177.38px; height: 50.38px; background: linear-gradient(107.56deg, #D02879 0%, #F16247 50%, #F5B100 100%); border-radius: 8.4px; border: none; cursor: pointer; }
.btn-apply-label { font-family: 'IBM Plex Sans', sans-serif; font-weight: 600; font-size: 16.79px; line-height: 25px; letter-spacing: 0.022em; color: #fff; }
.no-cv-bar { display: flex; justify-content: center; align-items: center; padding: 8.4px 10.5px; width: 393.59px; height: 42.79px; background: #181A22; }
.no-cv-text { font-family: 'IBM Plex Sans', sans-serif; font-weight: 500; font-size: 16.79px; line-height: 25px; letter-spacing: 0.1px; color: #fff; }
</style>
</head>
