<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HeyJobs Phone</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "IBM Plex Sans", sans-serif; background: transparent; }

    .scene {
      position: relative;
      display: inline-block;
      width: 820px;
      height: 680px;
      isolation: isolate;
    }

    .screen-wrap {
      position: absolute;
      top: 0; left: 0;
      width: 436px;
      height: 970px;
      transform-origin: 0 0;
      transform: matrix3d(0.52139079,-0.00143383,0,-0.00004967,-0.26305179,0.48979544,0,-0.00005085,0,0,1,0,308.728957,62.110897,0,1);
      border-radius: 42px;
      overflow: hidden;
      z-index: 1;
    }
    .screen-wrap img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: top center;
      opacity: 0;
      transition: opacity 0.55s ease;
    }
    .screen-wrap img.active { opacity: 1; }

    .dots {
      position: absolute;
      bottom: 3%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #BBBFCF;
      transition: background 0.3s, transform 0.3s;
    }
    .dot.active { background: #D02879; transform: scale(1.25); }

    .phone-img {
      position: absolute;
      top: 40px; left: 40px;
      width: 580px; height: 580px;
      object-fit: contain;
      object-position: top left;
      z-index: 2;
      pointer-events: none;
    }

    /* Flyout 1 — ON TOP of phone, right side, z-index above phone */
    .flyout-1 {
      position: absolute;
      right: 200px;
      top: calc(45% + 90px);
      transform: translateY(-50%);
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(8px) saturate(140%);
      -webkit-backdrop-filter: blur(8px) saturate(140%);
      border: 1px solid rgba(255,255,255,0.85);
      border-radius: 20px;
      padding: 24px 28px;
      width: 240px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.10), 0 4px 16px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.9);
      font-size: 18px;
      font-weight: 600;
      line-height: 1.55;
      color: #181A22;
      animation: fl1 5s ease-in-out infinite;
      z-index: 10;
    }
    @keyframes fl1 {
      0%,100% { transform: translateY(-50%) translateY(0); }
      50%      { transform: translateY(-50%) translateY(-10px); }
    }
    .flyout-1 .hl {
      color: #D02879;
      text-decoration: underline;
      text-decoration-color: #D02879;
      text-decoration-thickness: 2px;
      text-underline-offset: 3px;
    }

    /* Flyout 2 — top left, always visible, wide enough for 3 lines */
    .flyout-2 {
      position: absolute;
      left: 10px;
      top: 10px;
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(8px) saturate(140%);
      -webkit-backdrop-filter: blur(8px) saturate(140%);
      border: 1px solid rgba(255,255,255,0.85);
      border-radius: 20px;
      padding: 22px 26px;
      width: 290px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.10), 0 4px 16px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.9);
      font-size: 18px;
      font-weight: 600;
      line-height: 1.55;
      color: #181A22;
      animation: fl2 5.8s ease-in-out infinite;
      z-index: 10;
    }
    @keyframes fl2 {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }
    .flyout-2 .hl { color: #D02879; }
  </style>
</head>

  <div class="flyout-2" id="f2">

  <div class="flyout-1" id="f1">

    <span class="hl">nicht aktiv</span> suchen!
  </div>

</div>
<script>
const imgs = [document.getElementById("s0"), document.getElementById("s1"), document.getElementById("s2")];
const dots = [document.getElementById("d0"), document.getElementById("d1"), document.getElementById("d2")];
const sw      = document.getElementById("sw");
const phoneImg= document.getElementById("phoneImg");
const f1      = document.getElementById("f1");
const f2      = document.getElementById("f2");
let cur = 0;

function goTo(idx) {
  imgs[cur].classList.remove("active");
  dots[cur].classList.remove("active");
  cur = idx;
  imgs[cur].classList.add("active");
  dots[cur].classList.add("active");
}
setInterval(() => goTo((cur+1)%3), 3500);

// Mouse parallax — 3 distinct layers
let mx=0,my=0,lx=0,ly=0;
const BASE_M = '0.56805622,-0.00566596,0,-0.00004758,-0.25365674,0.51679416,0,-0.00004616,0,0,1,0,257.290000,10.040000,0,1';
document.addEventListener("mousemove", e => {
  mx = (e.clientX/innerWidth -0.5)*2;
  my = (e.clientY/innerHeight-0.5)*2;
});
(function loop(){
  requestAnimationFrame(loop);
  lx+=(mx-lx)*0.07; ly+=(my-ly)*0.07;
  // Layer 1 — phone + screen: ±12px
  const px=lx*12, py=ly*8;
  phoneImg.style.transform=`translate(${px}px,${py}px)`;
  sw.style.transform=`matrix3d(0.52139079,-0.00143383,0,-0.00004967,-0.26305179,0.48979544,0,-0.00005085,0,0,1,0,${(308.7290)+px},${(62.1109)+py},0,1)`;
  // Layer 2 — flyout 1: ±24px
  f1.style.transform=`translateY(-50%) translate(${lx*38}px,${ly*26}px)`;
  // Layer 3 — flyout 2: ±36px
  f2.style.transform=`translate(${lx*52}px,${ly*34}px)`;
})();
</script>
